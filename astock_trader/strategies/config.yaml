# 策略配置

strategies:
  tail:
    name: "尾盘策略"
    description: "尾盘买入，次日开盘卖出"
    enabled: true
    params:
      # 选股条件
      min_turnover_rate: 3.0        # 换手率 > 3%
      max_market_cap: 200.0         # 流通市值 < 200亿
      max_amplitude: 5.0            # 振幅 < 5%
      min_price: 4.0               # 股价下限
      max_price: 30.0              # 股价上限
      min_volume_ratio: 1.2         # 量比 > 1.2
      
      # 技术指标
      require_ma_bullish: true
      require_macd_golden: true
      
      # 买入时间
      buy_time_hour: 14
      buy_time_minute: 30
      
      # 卖出设置
      gap_up_threshold: 0.01       # 高开阈值 1%
      low_open_stop: 0.02          # 低开止损 2%
      stop_loss: 0.03              # 止损 3%
      max_hold_days: 3             # 最大持仓天数

  momentum:
    name: "动量策略"
    description: "追强势股，持有一周"
    enabled: false
    params:
      lookback_days: 20
      holding_days: 5
      top_n: 10

  breakout:
    name: "突破策略"
    description: "突破20日高点买入"
    enabled: false
    params:
      breakout_period: 20
      volume_threshold: 1.5

# 回测配置
backtest:
  initial_cash: 100000
  commission: 0.003
  slippage: 0.001
