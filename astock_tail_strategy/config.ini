# A股尾盘策略配置

# 选股硬条件
[filter]
min_turnover_rate = 3.0       # 换手率 > 3%
max_market_cap = 200.0        # 流通市值 < 200亿
max_amplitude = 5.0           # 振幅 < 5%
min_price = 4.0               # 股价下限
max_price = 30.0              # 股价上限
min_volume_ratio = 1.2        # 量比 > 1.2
must_be_limit_up = true      # 必须昨日涨停

# 技术指标（软参考）
[technical]
require_ma_bullish = true     # 要求均线多头（5日>10日>20日）
require_macd_golden = true    # 要求MACD金叉
require_breakout = false      # 要求平台突破

# 买入设置
[buy]
buy_time_hour = 14            # 尾盘买入时间（小时）
buy_time_minute = 30         # 尾盘买入时间（分钟）
position_size = 0.95          # 单只仓位（0-1）

# 卖出设置
[sell]
sell_on_gap_up = true         # 高开卖出
gap_up_threshold = 0.01      # 高开阈值 1%
low_open_stop = 0.02          # 低开止损 2%
stop_loss = 0.03              # 止损线 3%
stop_loss_low = 0.05          # 止损线 5%
max_hold_days = 3             # 最大持仓天数

# 回测设置
[backtest]
initial_cash = 100000         # 初始资金
commission = 0.003           # 手续费（千分之三）
slippage = 0.005             # 滑点（千分之五）
